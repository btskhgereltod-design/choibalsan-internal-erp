<!doctype html>
<html lang="mn">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Судалгаа бөглөх</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;background:#eef2f7;color:#0f172a;font-family:Arial,sans-serif}
    .wrap{max-width:760px;margin:0 auto;padding:18px}
    .card{background:#fff;border:1px solid #dbe3ef;border-radius:14px;box-shadow:0 8px 28px rgba(15,23,42,.08);overflow:hidden}
    .head{padding:22px 20px;background:linear-gradient(135deg,#eff6ff,#f8fafc);border-bottom:1px solid #e2e8f0}
    h1{margin:0 0 8px;font-size:22px}
    .muted{color:#64748b;font-size:13px;line-height:1.5}
    .body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
    .q{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:14px}
    .qt{font-weight:700;font-size:14px;margin-bottom:10px;line-height:1.45}
    label{display:flex;gap:8px;align-items:flex-start;margin:8px 0;font-size:14px;line-height:1.4}
    input[type=radio],input[type=checkbox]{margin-top:2px;width:17px;height:17px;accent-color:#2563eb}
    textarea,input[type=text]{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px;font-size:14px;background:#fff;outline:none}
    textarea:focus,input[type=text]:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .btn{border:0;border-radius:10px;background:#2563eb;color:#fff;font-weight:800;padding:13px 18px;font-size:15px;cursor:pointer}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .ok{padding:28px;text-align:center}
    .ok h2{margin:0 0 8px;color:#15803d}
    .err{padding:18px;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:12px}
  </style>
</head>
<body>
  <div class="wrap">
    <div id="app" class="card">
      <div class="body"><div class="muted">Ачааллаж байна...</div></div>
    </div>
  </div>
  <script>
    const $ = (s) => document.querySelector(s);
    const esc = (s) => String(s ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
    const token = new URLSearchParams(location.search).get("t") || "";
    let survey = null;
    let questions = [];

    function questionHtml(q, i) {
      const type = q.type || "Нэг сонголт";
      if (type === "Текст") {
        return `<div class="q"><div class="qt">${i + 1}. ${esc(q.text)}</div><textarea id="q_${i}" rows="3" placeholder="Хариултаа бичнэ үү"></textarea></div>`;
      }
      if (type === "Оноо (1-5)") {
        return `<div class="q"><div class="qt">${i + 1}. ${esc(q.text)}</div>${[1,2,3,4,5].map(n =>
          `<label><input type="radio" name="q_${i}" value="${n}"><span>${n}</span></label>`).join("")}</div>`;
      }
      const inputType = type === "Олон сонголт" ? "checkbox" : "radio";
      return `<div class="q"><div class="qt">${i + 1}. ${esc(q.text)}</div>${(q.options || []).map(opt =>
        `<label><input type="${inputType}" name="q_${i}" value="${esc(opt)}"><span>${esc(opt)}</span></label>`).join("")}</div>`;
    }

    function render() {
      $("#app").innerHTML = `
        <div class="head">
          <h1>${esc(survey.title)}</h1>
          <div class="muted">${esc(survey.description || "")}</div>
          ${survey.deadline ? `<div class="muted" style="margin-top:6px">Дуусах огноо: ${esc(survey.deadline)}</div>` : ""}
        </div>
        <div class="body">
          ${questions.map(questionHtml).join("")}
          <button id="submitBtn" class="btn" onclick="submitSurvey()">Илгээх</button>
        </div>`;
    }

    async function loadSurvey() {
      try {
        if (!token) throw new Error("Судалгааны холбоос буруу байна");
        const res = await fetch(`/api/public-surveys/${encodeURIComponent(token)}`);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Судалгаа ачаалж чадсангүй");
        survey = data;
        questions = typeof data.questions === "string" ? JSON.parse(data.questions || "[]") : (data.questions || []);
        render();
      } catch (e) {
        $("#app").innerHTML = `<div class="body"><div class="err">${esc(e.message)}</div></div>`;
      }
    }

    async function submitSurvey() {
      const answers = {};
      questions.forEach((q, i) => {
        const ta = document.getElementById(`q_${i}`);
        if (ta) { answers[i] = ta.value.trim(); return; }
        const vals = [...document.querySelectorAll(`input[name="q_${i}"]:checked`)].map(x => x.value);
        answers[i] = vals.length === 1 ? vals[0] : vals;
      });
      const btn = $("#submitBtn");
      btn.disabled = true;
      btn.textContent = "Илгээж байна...";
      try {
        const res = await fetch("/api/public-survey-responses", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, answers })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Илгээж чадсангүй");
        $("#app").innerHTML = `<div class="ok"><h2>Баярлалаа</h2><div class="muted">Таны судалгааны хариулт амжилттай илгээгдлээ.</div></div>`;
      } catch (e) {
        btn.disabled = false;
        btn.textContent = "Илгээх";
        alert(e.message);
      }
    }

    loadSurvey();
  </script>
</body>
</html>
